<script type="module">
import * as THREE from 'three';

try {

console.log('THREE OK:', THREE.REVISION);

// ═══ RENDERER ═══
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6BB3E0);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
camera.position.set(0, 80, 120);
camera.lookAt(0, 0, 0);

// ═══ LIGHTING ═══
scene.add(new THREE.AmbientLight(0x99aabb, 1.0));
const sun = new THREE.DirectionalLight(0xffeedd, 1.5);
sun.position.set(300, 400, 200);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x88bbff, 0x556644, 0.5));

// ═══ NOISE ═══
function hash(n) { let x = Math.sin(n) * 43758.5453; return x - Math.floor(x); }
function noise2D(x, y) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x - xi, yf = y - yi;
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  return hash(xi + yi * 157) + (hash(xi+1 + yi*157) - hash(xi + yi*157)) * u
       + (hash(xi + (yi+1)*157) - hash(xi + yi*157)) * v
       + (hash(xi + yi*157) - hash(xi+1 + yi*157) - hash(xi + (yi+1)*157) + hash(xi+1 + (yi+1)*157)) * u * v;
}
function fbm(x, y) {
  let v = 0, a = 1, f = 1;
  for (let i = 0; i < 5; i++) { v += noise2D(x * f, y * f) * a; a *= 0.5; f *= 2; }
  return v;
}

// ═══ TERRAIN ═══
const TS = 5000, TSEG = 250;
const FUJI_X = 800, FUJI_Z = -600, FUJI_R = 500, FUJI_H = 180;
const villages = [{x:-1400,z:-1000},{x:1600,z:700},{z:1700,x:-700},{x:1900,z:-1500},{x:-1700,z:1300}];

function terrainH(x, z) {
  let h = fbm(x * 0.0008, z * 0.0008) * 20 + 8;
  h += fbm(x * 0.003, z * 0.003) * 6;
  h += fbm(x * 0.008, z * 0.008) * 2;
  const dFuji = Math.sqrt((x - FUJI_X) ** 2 + (z - FUJI_Z) ** 2);
  if (dFuji < FUJI_R) { const fh = FUJI_H * (1 - dFuji / FUJI_R); const bl = Math.min(1, (FUJI_R - dFuji) / 80); h = Math.max(h, fh * bl); }
  const dc = Math.sqrt(x * x + z * z);
  if (dc < 700) h *= dc / 700;
  for (const v of villages) { const d = Math.sqrt((x - v.x) ** 2 + (z - v.z) ** 2); if (d < 300) h *= d / 300; }
  return Math.max(0, h);
}

// ═══ TERRAIN MESH ═══
{
  const geo = new THREE.PlaneGeometry(TS, TS, TSEG, TSEG);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  const cols = new Float32Array(pos.count * 3);
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i), h = terrainH(x, z);
    pos.setY(i, h);
    const t = Math.max(0, Math.min(1, h / 60));
    if (h < 2) { cols[i*3]=0.55; cols[i*3+1]=0.52; cols[i*3+2]=0.42; }
    else if (h < 15) { cols[i*3]=0.22+t*0.1; cols[i*3+1]=0.35+t*0.2; cols[i*3+2]=0.15+t*0.05; }
    else if (h < 50) { cols[i*3]=0.35+t*0.15; cols[i*3+1]=0.33+t*0.15; cols[i*3+2]=0.28+t*0.1; }
    else { cols[i*3]=0.7+t*0.2; cols[i*3+1]=0.7+t*0.2; cols[i*3+2]=0.72+t*0.2; }
  }
  geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
  geo.computeVertexNormals();
  scene.add(new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ vertexColors: true, flatShading: true })));
}
console.log('Terrain built');

// ═══ LAKES ═══
for (const [lx, lz, lr] of [[-800, 800, 200], [1000, 900, 150], [800, -350, 80]]) {
  const g = new THREE.CircleGeometry(lr, 32); g.rotateX(-Math.PI / 2);
  const m = new THREE.Mesh(g, new THREE.MeshLambertMaterial({ color: 0x2266aa, flatShading: true }));
  m.position.set(lx, 0.3, lz); scene.add(m);
}

// ═══ RIVERS ═══
function buildRiver(points, width) {
  const hw = width / 2, v = [], idx = [];
  for (let i = 0; i < points.length; i++) {
    const p = points[i], h = Math.max(0.1, terrainH(p.x, p.z) - 0.5);
    let dx, dz;
    if (i < points.length-1) { dx = points[i+1].x-p.x; dz = points[i+1].z-p.z; }
    else { dx = p.x-points[i-1].x; dz = p.z-points[i-1].z; }
    const l = Math.sqrt(dx*dx+dz*dz)||1;
    v.push(p.x+(-dz/l)*hw, h, p.z+(dx/l)*hw);
    v.push(p.x-(-dz/l)*hw, h, p.z-(dx/l)*hw);
    if (i > 0) { const vi=i*2; idx.push(vi-2,vi,vi-1, vi-1,vi,vi+1); }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
  g.setIndex(idx); g.computeVertexNormals();
  scene.add(new THREE.Mesh(g, new THREE.MeshLambertMaterial({ color: 0x2277bb, flatShading: true })));
}
{ const pts = []; for (let i=0;i<=30;i++){const t=i/30;pts.push({x:FUJI_X+Math.sin(t*2)*100+t*200,z:FUJI_Z+FUJI_R*0.8+t*600});} buildRiver(pts, 8); }
{ const pts = []; for (let i=0;i<=25;i++){const t=i/25;pts.push({x:1200-t*1500,z:-200+Math.sin(t*3)*150});} buildRiver(pts, 6); }

// ═══ FORESTS ═══
function addTree(x, z) {
  const h = terrainH(x, z); if (h < 2 || h > 40) return;
  const th = 2 + ((x*17+z*31)%100)/100*3;
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, th, 5), new THREE.MeshLambertMaterial({ color: 0x5c3a1e, flatShading: true }));
  trunk.position.set(x, h + th/2, z); scene.add(trunk);
  const ch = 2 + ((x*23+z*41)%100)/100*2;
  const crown = new THREE.Mesh(new THREE.ConeGeometry(1.5, ch, 6), new THREE.MeshLambertMaterial({ color: 0x1a5c1a, flatShading: true }));
  crown.position.set(x, h + th + ch/2, z); scene.add(crown);
}
for (const fc of [{x:-400,z:-1200,r:250,c:60},{x:600,z:-1000,r:200,c:40},{x:-1400,z:-400,r:300,c:70},{x:1200,z:300,r:200,c:40},{x:-1000,z:800,r:250,c:50},{x:400,z:1200,r:200,c:40},{x:-600,z:400,r:150,c:30},{x:1600,z:-800,r:180,c:35}]) {
  for (let i = 0; i < fc.c; i++) {
    const s = Math.round(fc.x*100+fc.z*10+i*7), a = (s*37%360)*Math.PI/180, d = (s*53%100)/100*fc.r;
    addTree(fc.x+Math.cos(a)*d, fc.z+Math.sin(a)*d);
  }
}

// ═══ ROADS ═══
const roads = [], rSegs = [];
function roadH(x, z) { return terrainH(x, z) + 0.15; }

function strip(pts, width, color) {
  if (pts.length < 2) return;
  const hw = width/2, v = [], idx = [];
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i], h = roadH(p.x, p.z);
    let dx, dz;
    if (i < pts.length-1) { dx=pts[i+1].x-p.x; dz=pts[i+1].z-p.z; }
    else { dx=p.x-pts[i-1].x; dz=p.z-pts[i-1].z; }
    const l = Math.sqrt(dx*dx+dz*dz)||1, nx=-dz/l*hw, nz=dx/l*hw;
    v.push(p.x+nx, h, p.z+nz, p.x-nx, h, p.z-nz);
    if (i > 0) { const vi=i*2; idx.push(vi-2,vi,vi-1,vi-1,vi,vi+1); }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
  g.setIndex(idx); g.computeVertexNormals();
  scene.add(new THREE.Mesh(g, new THREE.MeshLambertMaterial({ color, flatShading: true })));
}

function dashes(pts, color) {
  if (pts.length < 2) return;
  const g = new THREE.PlaneGeometry(0.2, 1.2), m = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, depthWrite: false });
  for (let i = 0; i < pts.length-1; i += 4) {
    const p = pts[i], pn = pts[Math.min(i+1, pts.length-1)];
    const d = new THREE.Mesh(g, m);
    d.position.set(p.x, roadH(p.x, p.z) + 0.02, p.z);
    d.rotation.x = -Math.PI/2; d.rotation.z = Math.atan2(pn.x-p.x, pn.z-p.z);
    scene.add(d);
  }
}

// Catmull-Rom smoothing
function catmull(p0,p1,p2,p3,t) {
  const t2=t*t, t3=t2*t;
  return { x: 0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
           z: 0.5*((2*p1.z)+(-p0.z+p2.z)*t+(2*p0.z-5*p1.z+4*p2.z-p3.z)*t2+(-p0.z+3*p1.z-3*p2.z+p3.z)*t3) };
}
function smooth(pts) {
  if (pts.length < 2) return pts;
  const r = [];
  for (let i = 0; i < pts.length-1; i++) {
    const p0=pts[Math.max(0,i-1)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(pts.length-1,i+2)];
    for (let j = 0; j < 8; j++) r.push(catmull(p0,p1,p2,p3, j/8));
  }
  r.push(pts[pts.length-1]);
  return r;
}

function mkLine(x1,z1,x2,z2) {
  const d=Math.sqrt((x2-x1)**2+(z2-z1)**2), n=Math.max(2,Math.floor(d/6)), pts=[];
  for(let i=0;i<=n;i++){const t=i/n;pts.push({x:x1+(x2-x1)*t,z:z1+(z2-z1)*t});}
  return pts;
}
function mkCurve(x1,z1,x2,z2,crv) {
  const d=Math.sqrt((x2-x1)**2+(z2-z1)**2), n=Math.max(20,Math.floor(d/6));
  const ox=((x1*31+z2*17)%100/100-0.5)*crv, oz=((z1*23+x2*37)%100/100-0.5)*crv;
  const cx=(x1+x2)/2+ox, cz=(z1+z2)/2+oz, pts=[];
  for(let i=0;i<=n;i++){const t=i/n;pts.push({x:(1-t)*(1-t)*x1+2*(1-t)*t*cx+t*t*x2,z:(1-t)*(1-t)*z1+2*(1-t)*t*cz+t*t*z2});}
  return pts;
}
function mkWind(x1,z1,x2,z2,jt) {
  const d=Math.sqrt((x2-x1)**2+(z2-z1)**2), n=Math.max(15,Math.floor(d/6)), pts=[];
  for(let i=0;i<=n;i++){const t=i/n;pts.push({x:x1+(x2-x1)*t+Math.sin(t*12.9+x1*0.01)*jt,z:z1+(z2-z1)*t+Math.cos(t*15.1+z1*0.01)*jt});}
  return pts;
}

function addRoad(pts, width, type) {
  const s = pts.length > 2 ? smooth(pts) : pts;
  const col = type==='highway'?0x555555:type==='street'?0x444444:0x8B7355;
  strip(s, width, col);
  if (type !== 'dirt') dashes(s, type==='highway'?0xaaaa33:0x666666);
  roads.push({pts:s, width, type});
  for(let i=0;i<s.length-1;i++) rSegs.push({a:s[i],b:s[i+1],width,type});
}

// City grid
const CR=350, BS=40, avenues=[], streets=[];
for(let i=-5;i<=5;i++){const x=i*BS;if(Math.abs(x)<CR){avenues.push(x);addRoad(mkLine(x,-CR,x,CR),7,'street');}}
for(let j=-5;j<=5;j++){const z=j*BS;if(Math.abs(z)<CR){streets.push(z);addRoad(mkLine(-CR,z,CR,z),7,'street');}}
addRoad(mkLine(0,-CR-40,0,CR+40),12,'highway');
addRoad(mkLine(-CR-40,0,CR+40,0),12,'highway');
addRoad(mkCurve(-CR,-CR,CR,CR,50),10,'highway');
addRoad(mkCurve(-CR,CR,CR,-CR,50),10,'highway');
for(const r of [CR, CR+250, CR+600]){const pts=[];for(let a=0;a<Math.PI*2;a+=0.06)pts.push({x:Math.cos(a)*r,z:Math.sin(a)*r});addRoad(pts,r>=CR+300?8:10,'highway');}

for(const v of villages){const a=Math.atan2(v.z,v.x);addRoad(mkCurve(Math.cos(a)*(CR+600),Math.sin(a)*(CR+600),v.x,v.z,150),8,'highway');}
const sv=[...villages].sort((a,b)=>Math.atan2(a.z,a.x)-Math.atan2(b.z,b.x));
for(let i=0;i<sv.length;i++){const a=sv[i],b=sv[(i+1)%sv.length];addRoad(mkCurve(a.x,a.z,b.x,b.z,200),6,'highway');}
addRoad(mkCurve(-1800,0,1800,0,300),6,'highway');
addRoad(mkCurve(0,-1800,0,1800,300),6,'highway');
addRoad(mkCurve(-1500,-1500,1500,1500,400),6,'highway');
addRoad(mkCurve(-1500,1500,1500,-1500,400),6,'highway');
for(let i=0;i<villages.length;i++){const a=villages[i],b=villages[(i+2)%villages.length];addRoad(mkWind(a.x,a.z,b.x,b.z,80),3.5,'dirt');for(let k=0;k<3;k++){const ang=(a.x*7+a.z*13+k*97)%(Math.PI*2),di=300+((a.x*3+a.z*7+k*41)%500);addRoad(mkWind(a.x,a.z,a.x+Math.cos(ang)*di,a.z+Math.sin(ang)*di,90),3,'dirt');}}
for(let i=0;i<15;i++){const a1=((i*7919)%10000)/10000*Math.PI*2,d1=500+((i*3571)%10000)/10000*800,sx=Math.cos(a1)*d1,sz=Math.sin(a1)*d1,a2=a1+((i*2137)%10000)/10000*2-1,d2=250+((i*4219)%10000)/10000*500;addRoad(mkWind(sx,sz,sx+Math.cos(a2)*d2,sz+Math.sin(a2)*d2,80),3,'dirt');}

console.log('Roads built:', roads.length, 'segments:', rSegs.length);

// ═══ BUILDINGS ═══
const buildings = [];
function addBuilding(x,z,w,h,d) {
  const y=terrainH(x,z); if(y<2) return;
  const r=0.3+((x*17+z*31)%100)/100*0.35, g=0.3+((x*23+z*41)%100)/100*0.35, b=0.3+((x*29+z*53)%100)/100*0.35;
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshLambertMaterial({color:new THREE.Color(r,g,b),flatShading:true}));
  mesh.position.set(x,y+h/2,z); mesh.castShadow=true; scene.add(mesh); buildings.push({x,z,w,d});
}
function onRoad(x,z,m) {
  for(const r of roads){for(let i=0;i<r.pts.length-1;i++){const p1=r.pts[i],p2=r.pts[i+1],dx=p2.x-p1.x,dz=p2.z-p1.z,l2=dx*dx+dz*dz;if(!l2)continue;let t=((x-p1.x)*dx+(z-p1.z)*dz)/l2;t=Math.max(0,Math.min(1,t));const cx=p1.x+t*dx,cz=p1.z+t*dz;if(Math.sqrt((x-cx)**2+(z-cz)**2)<r.width/2+m)return true;}}
  return false;
}
function ov(x,z,w,d,p){for(const b of buildings){if(Math.abs(x-b.x)<(w+b.w)/2+p&&Math.abs(z-b.z)<(d+b.d)/2+p)return true;}return false;}
for(let ai=0;ai<avenues.length-1;ai++){for(let sj=0;sj<streets.length-1;sj++){const x0=avenues[ai]+5,x1=avenues[ai+1]-5,z0=streets[sj]+5,z1=streets[sj+1]-5;if(x1-x0<10||z1-z0<10)continue;const mx=(x0+x1)/2,mz=(z0+z1)/2,hb=Math.max(0,1-Math.sqrt(mx*mx+mz*mz)/CR)*30,nB=1+Math.floor(((ai*7+sj*13)%3));for(let n=0;n<nB;n++){const s=ai*100+sj*10+n,bw=4+(s*7%100)/100*(x1-x0-10)/nB,bd=4+(s*11%100)/100*(z1-z0-10)/nB,bh=5+(s*13%100)/100*15+hb,px=x0+(s*17%100)/100*(x1-x0-bw)+bw/2,pz=z0+(s*19%100)/100*(z1-z0-bd)+bd/2;if(!ov(px,pz,bw,bd))addBuilding(px,pz,bw,bh,bd);}}}
for(const v of villages){for(let i=0;i<12;i++){const s=Math.round(v.x*100+v.z*10+i*7),a=(s*37%360)*Math.PI/180,di=20+(s*53%100)/100*120,x=v.x+Math.cos(a)*di,z=v.z+Math.sin(a)*di,w=4+(s*17%100)/100*7,hh=5+(s*23%100)/100*15,dd=4+(s*29%100)/100*7;if(!onRoad(x,z,2)&&!ov(x,z,w,dd))addBuilding(x,z,w,hh,dd);}}
console.log('Buildings:', buildings.length, 'Scene children:', scene.children.length);

// ═══ ROAD DETECTION ═══
function getRoadType(x,z) {
  let bd=Infinity,br=null;
  for(const s of rSegs){const dx=s.b.x-s.a.x,dz=s.b.z-s.a.z,l2=dx*dx+dz*dz;if(!l2)continue;let t=((x-s.a.x)*dx+(z-s.a.z)*dz)/l2;t=Math.max(0,Math.min(1,t));const cx=s.a.x+t*dx,cz=s.a.z+t*dz,d=Math.sqrt((x-cx)**2+(z-cz)**2);if(d<bd){bd=d;br=s;}}
  return(br&&bd<br.width/2+3)?br.type:null;
}

// ═══ CAR ═══
const car = new THREE.Group();
{new THREE.Mesh(new THREE.BoxGeometry(2.2,1.2,4.4),new THREE.MeshLambertMaterial({color:0xdd2222,flatShading:true})).position.y=0.6;car.add(car.children[car.children.length-1]);}
{new THREE.Mesh(new THREE.BoxGeometry(1.8,0.8,2.2),new THREE.MeshLambertMaterial({color:0x222233,flatShading:true})).position.set(0,1.3,-0.2);car.add(car.children[car.children.length-1]);}

const wheels=[];
{wGeo=new THREE.CylinderGeometry(0.4,0.4,0.25,8);wm=new THREE.MeshLambertMaterial({color:0x111111,flatShading:true});for(const[wx,wz] of [[-1.1,1.3],[1.1,1.3],[-1.1,-1.3],[1.1,-1.3]]){const w=new THREE.Mesh(wGeo,wm);w.rotation.z=Math.PI/2;w.position.set(wx,0.1,wz);car.add(w);wheels.push(w);}}

const spawnH = terrainH(0,0) + 0.6;
car.position.set(0, spawnH, 0);
scene.add(car);
console.log('Car spawned at Y:', spawnH.toFixed(1), 'TerrainH@0:', terrainH(0,0).toFixed(1));

// ═══ CAR PHYSICS ═══
const cs={vel:0,heading:0,steer:0,pos:new THREE.Vector3(0,spawnH,0),fwd:new THREE.Vector3(0,0,-1),onRoad:null};

function updateCar(dt) {
  const k=window._keys||{};cs.onRoad=getRoadType(cs.pos.x,cs.pos.z);
  if(k['w']||k['arrowup'])cs.vel+=30*dt;if(k['s']||k['arrowdown'])cs.vel-=35*dt;if(k[' '])cs.vel*=0.92;
  let fr=0.97,maxS=90;
  if(cs.onRoad==='highway'){fr=0.99;maxS=90;}else if(cs.onRoad==='street'){fr=0.99;maxS=72;}else if(cs.onRoad==='dirt'){fr=0.98;maxS=40;}else{fr=0.97;maxS=90;}
  cs.vel*=fr;cs.vel=Math.max(-25,Math.min(maxS,cs.vel));
  let ts=0;if(k['a']||k['arrowleft'])ts=0.7;if(k['d']||k['arrowright'])ts=-0.7;
  cs.steer+=(ts-cs.steer)*Math.min(1,3*dt*5);
  const sf=Math.min(1,Math.abs(cs.vel)/20);cs.heading+=cs.steer*sf*2.5*dt;
  cs.fwd.set(-Math.sin(cs.heading),0,-Math.cos(cs.heading));
  cs.pos.x+=cs.fwd.x*cs.vel*dt;cs.pos.z+=cs.fwd.z*cs.vel*dt;
  cs.pos.y=terrainH(cs.pos.x,cs.pos.z)+0.6;
  const sx=(terrainH(cs.pos.x+2,cs.pos.z)-terrainH(cs.pos.x-2,cs.pos.z))/4;
  const sz=(terrainH(cs.pos.x,cs.pos.z+2)-terrainH(cs.pos.x,cs.pos.z-2))/4;
  cs.vel+=-(sx*cs.fwd.x+sz*cs.fwd.z)*12*dt;
  for(const b of buildings){const dx=cs.pos.x-b.x,dz=cs.pos.z-b.z,ox=(b.w/2+1.3)-Math.abs(dx),od=(b.d/2+2.5)-Math.abs(dz);if(ox>0&&od>0){if(ox<od){cs.pos.x+=Math.sign(dx)*ox;cs.vel*=0.3;}else{cs.pos.z+=Math.sign(dz)*od;cs.vel*=0.3;}}}
  const lim=TS/2-50;cs.pos.x=Math.max(-lim,Math.min(lim,cs.pos.x));cs.pos.z=Math.max(-lim,Math.min(lim,cs.pos.z));
  car.position.copy(cs.pos);car.rotation.y=cs.heading;
  const sx2=(terrainH(cs.pos.x+2,cs.pos.z)-terrainH(cs.pos.x-2,cs.pos.z))/4;
  const sz2=(terrainH(cs.pos.x,cs.pos.z+2)-terrainH(cs.pos.x,cs.pos.z-2))/4;
  car.rotation.x=-sz2*0.4;car.rotation.z=sx2*0.4;
  for(const w of wheels)w.rotation.x+=cs.vel*dt*0.8;
  if(k['r']){cs.pos.set(0,terrainH(0,0)+0.6,0);cs.vel=0;cs.heading=0;cs.steer=0;cs.fwd.set(0,0,-1);}
}

// ═══ CAMERA ═══
const cam={dist:16,height:8,oYaw:Math.PI,oPitch:0.12,sYaw:Math.PI,sPitch:0.12,drag:false,lx:0,ly:0};
renderer.domElement.addEventListener('mousedown',e=>{cam.drag=true;cam.lx=e.clientX;cam.ly=e.clientY;document.getElementById('hint').style.opacity='0';});
window.addEventListener('mouseup',()=>cam.drag=false);
window.addEventListener('mousemove',e=>{if(!cam.drag)return;cam.oYaw-=(e.clientX-cam.lx)*0.005;cam.oPitch+=(e.clientY-cam.ly)*0.005;cam.oPitch=Math.max(-0.3,Math.min(1.2,cam.oPitch));cam.lx=e.clientX;cam.ly=e.clientY;});
renderer.domElement.addEventListener('wheel',e=>{cam.dist=Math.max(5,Math.min(30,cam.dist+e.deltaY*0.01));});
let tx,ty;
renderer.domElement.addEventListener('touchstart',e=>{if(e.touches.length===1){cam.drag=true;tx=e.touches[0].clientX;ty=e.touches[0].clientY;document.getElementById('hint').style.opacity='0';}});
renderer.domElement.addEventListener('touchmove',e=>{if(!cam.drag||e.touches.length!==1)return;cam.oYaw-=(e.touches[0].clientX-tx)*0.005;cam.oPitch+=(e.touches[0].clientY-ty)*0.005;cam.oPitch=Math.max(-0.3,Math.min(1.2,cam.oPitch));tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
renderer.domElement.addEventListener('touchend',()=>cam.drag=false);

function updateCam(dt) {
  const s=1-Math.pow(0.005,dt);cam.sYaw+=(cam.oYaw-cam.sYaw)*s;cam.sPitch+=(cam.oPitch-cam.sPitch)*s;
  const yaw=cs.heading+cam.sYaw,pitch=cam.sPitch,hd=Math.cos(pitch)*cam.dist,vd=Math.sin(pitch)*cam.dist;
  const targetX=cs.pos.x+Math.sin(yaw)*hd,targetY=cs.pos.y+vd+cam.height,targetZ=cs.pos.z+Math.cos(yaw)*hd;
  const lf=1-Math.pow(0.008,dt);
  camera.position.x+=(targetX-camera.position.x)*lf;camera.position.y+=(targetY-camera.position.y)*lf;camera.position.z+=(targetZ-camera.position.z)*lf;
  camera.lookAt(cs.pos.x,cs.pos.y+1.5,cs.pos.z);
}

// ═══ MINIMAP ═══
const mc=document.getElementById('minimap'),mctx=mc.getContext('2d');mc.width=180;mc.height=180;
function drawMM() {
  const w=mc.width,h=mc.height,sc=w/TS;mctx.fillStyle='#1a2a1a';mctx.fillRect(0,0,w,h);
  for(const r of roads){mctx.strokeStyle=r.type==='dirt'?'#8B7355':r.type==='highway'?'#999':'#666';mctx.lineWidth=r.type==='highway'?2:1;mctx.beginPath();for(let i=0;i<r.pts.length;i++){const p=r.pts[i],mx=(p.x+TS/2)*sc,mz=(p.z+TS/2)*sc;i===0?mctx.moveTo(mx,mz):mctx.lineTo(mx,mz);}mctx.stroke();}
  const cx=(cs.pos.x+TS/2)*sc,cz=(cs.pos.z+TS/2)*sc;mctx.fillStyle='#ff3333';mctx.beginPath();mctx.arc(cx,cz,3,0,Math.PI*2);mctx.fill();
}

// ═══ INPUT + HUD ═══
window._keys={};window.addEventListener('keydown',e=>{window._keys[e.key.toLowerCase()]=true;});window.addEventListener('keyup',e=>{window._keys[e.key.toLowerCase()]=false;});
const spdEl=document.getElementById('spd'),infoEl=document.getElementById('info');
const RN={highway:'HIGHWAY',street:'CITY STREET',dirt:'DIRT TRAIL'},RC={highway:'#aaffaa',street:'#cccccc',dirt:'#c8a86e'};
function updateHUD(){spdEl.textContent=Math.round(Math.abs(cs.vel*3.6));if(cs.onRoad){infoEl.textContent=RN[cs.onRoad];infoEl.style.color=RC[cs.onRoad];}else{infoEl.textContent='OFF-ROAD';infoEl.style.color='#ff8888';}}

// ═══ LOOP ═══
let lt=performance.now(),mmT=0,fc=0;
function animate(){
  requestAnimationFrame(animate);const now=performance.now();let dt=(now-lt)/1000;lt=now;dt=Math.min(dt,0.05);
  updateCar(dt);updateCam(dt);updateHUD();mmT+=dt;if(mmT>0.15){mmT=0;drawMM();}
  renderer.render(scene,camera);fc++;
  if(fc===1)console.log('FRAME 1 — Cam:',camera.position.x.toFixed(0),camera.position.y.toFixed(0),camera.position.z.toFixed(0),'Car Y:',cs.pos.y.toFixed(1));
}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

console.log('=== ALL DONE ===');
} catch(e) { console.error('FATAL:', e); document.body.innerHTML = '<pre style="color:#fff;background:#a00;padding:20px;font-size:16px;">ERROR:\n' + e.message + '\n\n' + e.stack + '</pre>'; }
}
</script>
