<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cubey World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #6BB3E0; }
canvas { display: block; }
#hud {
  position: fixed; top: 20px; left: 20px;
  color: #fff; font-family: monospace;
  font-size: 18px; text-shadow: 2px 2px 4px #000;
  pointer-events: none; z-index: 10;
}
#hud .speed { font-size: 40px; font-weight: bold; }
#hud .label { font-size: 12px; opacity: 0.7; }
#hud .info { font-size: 11px; margin-top: 6px; opacity: 0.5; }
#controls {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  color: #fff; font-family: monospace; font-size: 12px;
  text-shadow: 1px 1px 3px #000;
  pointer-events: none; z-index: 10; opacity: 0.5;
}
#minimap {
  position: fixed; bottom: 20px; right: 20px;
  width: 180px; height: 180px;
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 4px; z-index: 10; pointer-events: none;
}
#hint {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: #fff; font-family: monospace; font-size: 15px;
  text-shadow: 2px 2px 4px #000; pointer-events: none;
  z-index: 10; opacity: 0.35; transition: opacity 2s;
}
</style>
</head>
<body>
<div id="hud">
  <div class="speed" id="spd">0</div>
  <div class="label">KM/H</div>
  <div class="info" id="info">loading...</div>
</div>
<div id="controls">W/S drive | A/D steer | SPACE brake | R reset | Mouse drag look</div>
<canvas id="minimap"></canvas>
<div id="hint">Click &amp; drag to look, scroll to zoom</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
console.log('THREE:', THREE.REVISION);

// ═══════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6BB3E0);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
camera.position.set(0, 80, 120);
camera.lookAt(0, 0, 0);

// ═══════════════════════════════════════════════════════
// LIGHTING
// ═══════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x99aabb, 1.0));
const sun = new THREE.DirectionalLight(0xffeedd, 1.5);
sun.position.set(300, 400, 200);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x88bbff, 0x556644, 0.5));

// ═══════════════════════════════════════════════════════
// NOISE
// ═══════════════════════════════════════════════════════
function hash(n) {
  let x = Math.sin(n) * 43758.5453;
  return x - Math.floor(x);
}
function noise2D(x, y) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x - xi, yf = y - yi;
  const u = xf * xf * (3 - 2 * xf);
  const v = yf * yf * (3 - 2 * yf);
  const a = hash(xi + yi * 157);
  const b = hash(xi + 1 + yi * 157);
  const c = hash(xi + (yi + 1) * 157);
  const d = hash(xi + 1 + (yi + 1) * 157);
  return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
}
function fbm(x, y) {
  let v = 0, a = 1, f = 1;
  for (let i = 0; i < 5; i++) { v += noise2D(x * f, y * f) * a; a *= 0.5; f *= 2; }
  return v;
}

// ═══════════════════════════════════════════════════════
// TERRAIN HEIGHT
// ═══════════════════════════════════════════════════════
const TS = 5000;
const TSEG = 250;

// Mount Fuji: massive cone at (800, -600)
const FUJI_X = 800, FUJI_Z = -600, FUJI_R = 500, FUJI_H = 180;

function terrainH(x, z) {
  // Base rolling hills
  let h = fbm(x * 0.0008, z * 0.0008) * 20 + 8;
  h += fbm(x * 0.003, z * 0.003) * 6;
  h += fbm(x * 0.008, z * 0.008) * 2;

  // Mount Fuji — smooth cone
  const dFuji = Math.sqrt((x - FUJI_X) ** 2 + (z - FUJI_Z) ** 2);
  if (dFuji < FUJI_R) {
    const fujiH = FUJI_H * (1 - dFuji / FUJI_R);
    // Smooth blend at base
    const blend = Math.min(1, (FUJI_R - dFuji) / 80);
    h = Math.max(h, fujiH * blend);
  }

  // Flatten center for city
  const dc = Math.sqrt(x * x + z * z);
  if (dc < 700) h *= dc / 700;

  // Flatten village areas
  for (const v of villages) {
    const d = Math.sqrt((x - v.x) ** 2 + (z - v.z) ** 2);
    if (d < 300) h *= d / 300;
  }

  return Math.max(0, h);
}

// ═══════════════════════════════════════════════════════
// TERRAIN MESH
// ═══════════════════════════════════════════════════════
{
  const geo = new THREE.PlaneGeometry(TS, TS, TSEG, TSEG);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  const cols = new Float32Array(pos.count * 3);

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const h = terrainH(x, z);
    pos.setY(i, h);

    // Color based on height and slope
    const t = Math.max(0, Math.min(1, h / 60));
    // Check if near water (low areas)
    const slopeX = terrainH(x+5, z) - terrainH(x-5, z);
    const slopeZ = terrainH(x, z+5) - terrainH(x, z-5);
    const slope = Math.sqrt(slopeX * slopeX + slopeZ * slopeZ);

    let r, g, b;
    if (h < 2) {
      // Sandy/shore
      r = 0.55; g = 0.52; b = 0.42;
    } else if (h < 15) {
      // Grass
      r = 0.22 + t * 0.1; g = 0.35 + t * 0.2; b = 0.15 + t * 0.05;
    } else if (h < 50) {
      // Rocky
      r = 0.35 + t * 0.15; g = 0.33 + t * 0.15; b = 0.28 + t * 0.1;
    } else {
      // Snow caps
      r = 0.7 + t * 0.2; g = 0.7 + t * 0.2; b = 0.72 + t * 0.2;
    }
    cols[i*3] = r; cols[i*3+1] = g; cols[i*3+2] = b;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
  geo.computeVertexNormals();

  const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ vertexColors: true, flatShading: true }));
  mesh.receiveShadow = true;
  scene.add(mesh);
}

// ═══════════════════════════════════════════════════════
// LAKES — flat blue water at low terrain areas
// ═══════════════════════════════════════════════════════
{
  // Lake 1: southwest area
  const lakeGeo = new THREE.CircleGeometry(200, 32);
  lakeGeo.rotateX(-Math.PI / 2);
  const lake1 = new THREE.Mesh(lakeGeo, new THREE.MeshLambertMaterial({ color: 0x2266aa, flatShading: true }));
  lake1.position.set(-800, 0.3, 800);
  scene.add(lake1);

  // Lake 2: southeast
  const lakeGeo2 = new THREE.CircleGeometry(150, 32);
  lakeGeo2.rotateX(-Math.PI / 2);
  const lake2 = new THREE.Mesh(lakeGeo2, new THREE.MeshLambertMaterial({ color: 0x2266aa, flatShading: true }));
  lake2.position.set(1000, 0.3, 900);
  scene.add(lake2);

  // Lake 3: near Mount Fuji (crater lake)
  const lakeGeo3 = new THREE.CircleGeometry(80, 24);
  lakeGeo3.rotateX(-Math.PI / 2);
  const lake3 = new THREE.Mesh(lakeGeo3, new THREE.MeshLambertMaterial({ color: 0x3388cc, flatShading: true }));
  lake3.position.set(800, 0.3, -350);
  scene.add(lake3);
}

// ═══════════════════════════════════════════════════════
// RIVERS — blue strips flowing downhill
// ═══════════════════════════════════════════════════════
function buildRiver(points, width) {
  const riverGeo = new THREE.BufferGeometry();
  const hw = width / 2;
  const v = [];
  const idx = [];

  for (let i = 0; i < points.length; i++) {
    const p = points[i];
    const h = Math.max(0.1, terrainH(p.x, p.z) - 0.5);

    let dx, dz;
    if (i < points.length - 1) { dx = points[i+1].x - p.x; dz = points[i+1].z - p.z; }
    else { dx = p.x - points[i-1].x; dz = p.z - points[i-1].z; }
    const len = Math.sqrt(dx*dx + dz*dz) || 1;
    const nx = -dz / len * hw;
    const nz = dx / len * hw;

    v.push(p.x + nx, h, p.z + nz);
    v.push(p.x - nx, h, p.z - nz);
    if (i > 0) { const vi = i * 2; idx.push(vi-2, vi, vi-1, vi-1, vi, vi+1); }
  }

  riverGeo.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
  riverGeo.setIndex(idx);
  riverGeo.computeVertexNormals();
  const mesh = new THREE.Mesh(riverGeo, new THREE.MeshLambertMaterial({ color: 0x2277bb, flatShading: true }));
  mesh.receiveShadow = true;
  scene.add(mesh);
}

// River from Mount Fuji flowing south
{
  const pts = [];
  for (let i = 0; i <= 30; i++) {
    const t = i / 30;
    pts.push({
      x: FUJI_X + Math.sin(t * 2) * 100 + t * 200,
      z: FUJI_Z + FUJI_R * 0.8 + t * 600
    });
  }
  buildRiver(pts, 8);
}

// River flowing west from hills
{
  const pts = [];
  for (let i = 0; i <= 25; i++) {
    const t = i / 25;
    pts.push({
      x: 1200 - t * 1500,
      z: -200 + Math.sin(t * 3) * 150
    });
  }
  buildRiver(pts, 6);
}

// ═══════════════════════════════════════════════════════
// FORESTS — clusters of tree-like boxes
// ═══════════════════════════════════════════════════════
function addTree(x, z) {
  const h = terrainH(x, z);
  if (h < 2 || h > 40) return; // only on grass, not snow or shore
  const trunkH = 2 + ((x * 17 + z * 31) % 100) / 100 * 3;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.4, trunkH, 5),
    new THREE.MeshLambertMaterial({ color: 0x5c3a1e, flatShading: true })
  );
  trunk.position.set(x, h + trunkH / 2, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const crownH = 2 + ((x * 23 + z * 41) % 100) / 100 * 2;
  const crown = new THREE.Mesh(
    new THREE.ConeGeometry(1.5, crownH, 6),
    new THREE.MeshLambertMaterial({ color: 0x1a5c1a, flatShading: true })
  );
  crown.position.set(x, h + trunkH + crownH / 2, z);
  crown.castShadow = true;
  scene.add(crown);
}

// Forest clusters
const forestCenters = [
  { x: -400, z: -1200, r: 250, count: 60 },
  { x: 600, z: -1000, r: 200, count: 40 },
  { x: -1400, z: -400, r: 300, count: 70 },
  { x: 1200, z: 300, r: 200, count: 40 },
  { x: -1000, z: 800, r: 250, count: 50 },
  { x: 400, z: 1200, r: 200, count: 40 },
  { x: -600, z: 400, r: 150, count: 30 },
  { x: 1600, z: -800, r: 180, count: 35 },
];

for (const fc of forestCenters) {
  for (let i = 0; i < fc.count; i++) {
    const seed = Math.round(fc.x * 100 + fc.z * 10 + i * 7);
    const ang = (seed * 37 % 360) * Math.PI / 180;
    const dist = (seed * 53 % 100) / 100 * fc.r;
    const x = fc.x + Math.cos(ang) * dist;
    const z = fc.z + Math.sin(ang) * dist;
    addTree(x, z);
  }
}

// ═══════════════════════════════════════════════════════
// ROAD SYSTEM
// ═══════════════════════════════════════════════════════
const roads = [];
const rSegs = [];

function roadSurfH(x, z) { return terrainH(x, z) + 0.15; }

function buildRoadStrip(pts, width, color) {
  if (pts.length < 2) return;
  const hw = width / 2;
  const v = [];
  const idx = [];

  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    const h = roadSurfH(p.x, p.z);

    let dx, dz;
    if (i < pts.length - 1) { dx = pts[i+1].x - p.x; dz = pts[i+1].z - p.z; }
    else { dx = p.x - pts[i-1].x; dz = p.z - pts[i-1].z; }
    const len = Math.sqrt(dx*dx + dz*dz) || 1;
    const nx = -dz / len * hw;
    const nz = dx / len * hw;

    v.push(p.x + nx, h, p.z + nz);
    v.push(p.x - nx, h, p.z - nz);
    if (i > 0) { const vi = i * 2; idx.push(vi-2, vi, vi-1, vi-1, vi, vi+1); }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();

  const mat = new THREE.MeshLambertMaterial({ color, flatShading: true });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  scene.add(mesh);
}

function buildDashes(pts, color) {
  if (pts.length < 2) return;
  const geo = new THREE.PlaneGeometry(0.2, 1.2);
  const mat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, depthWrite: false });
  for (let i = 0; i < pts.length - 1; i += 4) {
    const p = pts[i];
    const pn = pts[Math.min(i + 1, pts.length - 1)];
    const m = new THREE.Mesh(geo, mat);
    m.position.set(p.x, roadSurfH(p.x, p.z) + 0.02, p.z);
    m.rotation.x = -Math.PI / 2;
    m.rotation.z = Math.atan2(pn.x - p.x, pn.z - p.z);
    scene.add(m);
  }
}

// Catmull-Rom spline interpolation for smooth roads
function catmullRom(p0, p1, p2, p3, t) {
  const t2 = t * t, t3 = t2 * t;
  return {
    x: 0.5 * ((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    z: 0.5 * ((2*p1.z) + (-p0.z+p2.z)*t + (2*p0.z-5*p1.z+4*p2.z-p3.z)*t2 + (-p0.z+3*p1.z-3*p2.z+p3.z)*t3)
  };
}

function genSmoothPath(points) {
  if (points.length < 2) return points;
  const result = [];
  const segsPerPair = 8;

  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[Math.max(0, i - 1)];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[Math.min(points.length - 1, i + 2)];

    for (let j = 0; j < segsPerPair; j++) {
      result.push(catmullRom(p0, p1, p2, p3, j / segsPerPair));
    }
  }
  result.push(points[points.length - 1]);
  return result;
}

function genStraight(x1, z1, x2, z2) {
  const dist = Math.sqrt((x2-x1)**2 + (z2-z1)**2);
  const n = Math.max(2, Math.floor(dist / 6));
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    pts.push({ x: x1 + (x2-x1)*t, z: z1 + (z2-z1)*t });
  }
  return pts;
}

function genCurve(x1, z1, x2, z2, curve) {
  const dist = Math.sqrt((x2-x1)**2 + (z2-z1)**2);
  const n = Math.max(20, Math.floor(dist / 6));
  const ox = ((x1 * 31 + z2 * 17) % 100 / 100 - 0.5) * curve;
  const oz = ((z1 * 23 + x2 * 37) % 100 / 100 - 0.5) * curve;
  const cx = (x1+x2)/2 + ox;
  const cz = (z1+z2)/2 + oz;

  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    pts.push({
      x: (1-t)*(1-t)*x1 + 2*(1-t)*t*cx + t*t*x2,
      z: (1-t)*(1-t)*z1 + 2*(1-t)*t*cz + t*t*z2
    });
  }
  return pts;
}

function genWinding(x1, z1, x2, z2, segments, jitter) {
  const dist = Math.sqrt((x2-x1)**2 + (z2-z1)**2);
  const n = Math.max(15, Math.floor(dist / 6));
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    const baseX = x1 + (x2-x1)*t;
    const baseZ = z1 + (z2-z1)*t;
    const jx = Math.sin(t * 12.9 + x1 * 0.01) * jitter;
    const jz = Math.cos(t * 15.1 + z1 * 0.01) * jitter;
    pts.push({ x: baseX + jx, z: baseZ + jz });
  }
  return pts;
}

function addRoad(pts, width, type) {
  // Smooth the path with Catmull-Rom
  const smoothPts = pts.length > 2 ? genSmoothPath(pts) : pts;

  const color = type === 'highway' ? 0x555555 : type === 'street' ? 0x444444 : 0x8B7355;
  buildRoadStrip(smoothPts, width, color);
  if (type !== 'dirt') buildDashes(smoothPts, type === 'highway' ? 0xaaaa33 : 0x666666);

  roads.push({ pts: smoothPts, width, type });
  for (let i = 0; i < smoothPts.length - 1; i++) {
    rSegs.push({ a: smoothPts[i], b: smoothPts[i+1], width, type });
  }
}

// ─── CITY GRID — denser ────────────────────────────────
const CR = 350, BS = 40;

const avenues = [];
for (let i = -5; i <= 5; i++) {
  const x = i * BS;
  if (Math.abs(x) < CR) {
    avenues.push(x);
    addRoad(genStraight(x, -CR, x, CR), 7, 'street');
  }
}

const streets = [];
for (let j = -5; j <= 5; j++) {
  const z = j * BS;
  if (Math.abs(z) < CR) {
    streets.push(z);
    addRoad(genStraight(-CR, z, CR, z), 7, 'street');
  }
}

// Main boulevards
addRoad(genStraight(0, -CR - 40, 0, CR + 40), 12, 'highway');
addRoad(genStraight(-CR - 40, 0, CR + 40, 0), 12, 'highway');

// Diagonal highways
addRoad(genCurve(-CR, -CR, CR, CR, 50), 10, 'highway');
addRoad(genCurve(-CR, CR, CR, -CR, 50), 10, 'highway');

// Ring roads
{
  const pts = [];
  for (let a = 0; a < Math.PI * 2; a += 0.06) {
    pts.push({ x: Math.cos(a) * CR, z: Math.sin(a) * CR });
  }
  addRoad(pts, 10, 'highway');
}
{
  const pts = [];
  for (let a = 0; a < Math.PI * 2; a += 0.06) {
    pts.push({ x: Math.cos(a) * (CR + 250), z: Math.sin(a) * (CR + 250) });
  }
  addRoad(pts, 8, 'highway');
}
{
  const pts = [];
  for (let a = 0; a < Math.PI * 2; a += 0.06) {
    pts.push({ x: Math.cos(a) * (CR + 600), z: Math.sin(a) * (CR + 600) });
  }
  addRoad(pts, 8, 'highway');
}

// ─── VILLAGES ─────────────────────────────────────────
const villages = [
  { x: -1400, z: -1000 },
  { x: 1600, z: 700 },
  { x: -700, z: 1700 },
  { x: 1900, z: -1500 },
  { x: -1700, z: 1300 },
];

// Highways from outer ring to each village
for (const v of villages) {
  const ang = Math.atan2(v.z, v.x);
  const ringX = Math.cos(ang) * (CR + 600);
  const ringZ = Math.sin(ang) * (CR + 600);
  addRoad(genCurve(ringX, ringZ, v.x, v.z, 150), 8, 'highway');
}

// Highway ring connecting villages
{
  const sorted = [...villages].sort((a, b) => Math.atan2(a.z, a.x) - Math.atan2(b.z, b.x));
  for (let i = 0; i < sorted.length; i++) {
    const a = sorted[i], b = sorted[(i+1) % sorted.length];
    addRoad(genCurve(a.x, a.z, b.x, b.z, 200), 6, 'highway');
  }
}

// More highways: cross-country routes
addRoad(genCurve(-1800, 0, 1800, 0, 300), 6, 'highway');
addRoad(genCurve(0, -1800, 0, 1800, 300), 6, 'highway');
addRoad(genCurve(-1500, -1500, 1500, 1500, 400), 6, 'highway');
addRoad(genCurve(-1500, 1500, 1500, -1500, 400), 6, 'highway');

// Dirt trails everywhere
for (let i = 0; i < villages.length; i++) {
  const a = villages[i];
  const b = villages[(i+2) % villages.length];
  addRoad(genWinding(a.x, a.z, b.x, b.z, 20, 80), 3.5, 'dirt');
  // Extra scenic trails
  for (let k = 0; k < 3; k++) {
    const ang = (a.x * 7 + a.z * 13 + k * 97) % (Math.PI * 2);
    const dist = 300 + ((a.x * 3 + a.z * 7 + k * 41) % 500);
    const ex = a.x + Math.cos(ang) * dist;
    const ez = a.z + Math.sin(ang) * dist;
    addRoad(genWinding(a.x, a.z, ex, ez, 15, 90), 3, 'dirt');
  }
}

// Random wilderness trails
for (let i = 0; i < 15; i++) {
  const a1 = ((i * 7919) % 10000) / 10000 * Math.PI * 2;
  const d1 = 500 + ((i * 3571) % 10000) / 10000 * 800;
  const sx = Math.cos(a1) * d1;
  const sz = Math.sin(a1) * d1;
  const a2 = a1 + ((i * 2137) % 10000) / 10000 * 2 - 1;
  const d2 = 250 + ((i * 4219) % 10000) / 10000 * 500;
  addRoad(genWinding(sx, sz, sx + Math.cos(a2) * d2, sz + Math.sin(a2) * d2, 12, 80), 3, 'dirt');
}

// ═══════════════════════════════════════════════════════
// BUILDINGS
// ═══════════════════════════════════════════════════════
const buildings = [];

function addBuilding(x, z, w, h, d) {
  const y = terrainH(x, z);
  if (y < 2) return; // don't build on water
  const r = 0.3 + ((x * 17 + z * 31) % 100) / 100 * 0.35;
  const g = 0.3 + ((x * 23 + z * 41) % 100) / 100 * 0.35;
  const b = 0.3 + ((x * 29 + z * 53) % 100) / 100 * 0.35;
  const mat = new THREE.MeshLambertMaterial({ color: new THREE.Color(r, g, b), flatShading: true });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, y + h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  buildings.push({ x, z, w, d });
}

function onRoad(x, z, margin) {
  for (const r of roads) {
    for (let i = 0; i < r.pts.length - 1; i++) {
      const p1 = r.pts[i], p2 = r.pts[i+1];
      const dx = p2.x - p1.x, dz = p2.z - p1.z;
      const l2 = dx*dx + dz*dz;
      if (!l2) continue;
      let t = ((x-p1.x)*dx + (z-p1.z)*dz) / l2;
      t = Math.max(0, Math.min(1, t));
      const cx = p1.x + t*dx, cz = p1.z + t*dz;
      if (Math.sqrt((x-cx)**2 + (z-cz)**2) < r.width/2 + margin) return true;
    }
  }
  return false;
}

function overlaps(x, z, w, d, pad) {
  for (const b of buildings) {
    if (Math.abs(x-b.x) < (w+b.w)/2+pad && Math.abs(z-b.z) < (d+b.d)/2+pad) return true;
  }
  return false;
}

// City block buildings
for (let ai = 0; ai < avenues.length - 1; ai++) {
  for (let sj = 0; sj < streets.length - 1; sj++) {
    const x0 = avenues[ai] + 5, x1 = avenues[ai+1] - 5;
    const z0 = streets[sj] + 5, z1 = streets[sj+1] - 5;
    if (x1 - x0 < 10 || z1 - z0 < 10) continue;

    const mx = (x0+x1)/2, mz = (z0+z1)/2;
    const distC = Math.sqrt(mx*mx + mz*mz);
    const heightBoost = Math.max(0, 1 - distC / CR) * 30;

    const nB = 1 + Math.floor(((ai * 7 + sj * 13) % 3));
    for (let n = 0; n < nB; n++) {
      const seed = ai * 100 + sj * 10 + n;
      const bw = 4 + (seed * 7 % 100) / 100 * (x1-x0-10) / nB;
      const bd = 4 + (seed * 11 % 100) / 100 * (z1-z0-10) / nB;
      const bh = 5 + (seed * 13 % 100) / 100 * 15 + heightBoost;
      const px = x0 + (seed * 17 % 100) / 100 * (x1-x0-bw) + bw/2;
      const pz = z0 + (seed * 19 % 100) / 100 * (z1-z0-bd) + bd/2;
      if (!overlaps(px, pz, bw, bd)) addBuilding(px, pz, bw, bh, bd);
    }
  }
}

// Village buildings
for (const v of villages) {
  for (let i = 0; i < 12; i++) {
    const seed = Math.round(v.x * 100 + v.z * 10 + i * 7);
    const ang = (seed * 37 % 360) * Math.PI / 180;
    const dist = 20 + (seed * 53 % 100) / 100 * 120;
    const x = v.x + Math.cos(ang) * dist;
    const z = v.z + Math.sin(ang) * dist;
    const w = 4 + (seed * 17 % 100) / 100 * 7;
    const h = 5 + (seed * 23 % 100) / 100 * 15;
    const d = 4 + (seed * 29 % 100) / 100 * 7;
    if (!onRoad(x, z, 2) && !overlaps(x, z, w, d)) addBuilding(x, z, w, h, d);
  }
}

console.log('Scene built. Objects:', scene.children.length);

// ═══════════════════════════════════════════════════════
// ROAD DETECTION
// ═══════════════════════════════════════════════════════
function getRoadType(x, z) {
  let bestD = Infinity, best = null;
  for (const s of rSegs) {
    const dx = s.b.x - s.a.x, dz = s.b.z - s.a.z;
    const l2 = dx*dx + dz*dz;
    if (!l2) continue;
    let t = ((x - s.a.x)*dx + (z - s.a.z)*dz) / l2;
    t = Math.max(0, Math.min(1, t));
    const cx = s.a.x + t*dx, cz = s.a.z + t*dz;
    const d = Math.sqrt((x-cx)**2 + (z-cz)**2);
    if (d < bestD) { bestD = d; best = s; }
  }
  return (best && bestD < best.width/2 + 3) ? best.type : null;
}

// ═══════════════════════════════════════════════════════
// CAR
// ═══════════════════════════════════════════════════════
const car = new THREE.Group();

{
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 1.2, 4.4),
    new THREE.MeshLambertMaterial({ color: 0xdd2222, flatShading: true })
  );
  body.position.y = 0.6;
  body.castShadow = true;
  car.add(body);
}
{
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.8, 0.8, 2.2),
    new THREE.MeshLambertMaterial({ color: 0x222233, flatShading: true })
  );
  cabin.position.set(0, 1.3, -0.2);
  cabin.castShadow = true;
  car.add(cabin);
}

const wheels = [];
{
  const wg = new THREE.CylinderGeometry(0.4, 0.4, 0.25, 8);
  const wm = new THREE.MeshLambertMaterial({ color: 0x111111, flatShading: true });
  for (const [wx, wz] of [[-1.1, 1.3], [1.1, 1.3], [-1.1, -1.3], [1.1, -1.3]]) {
    const w = new THREE.Mesh(wg, wm);
    w.rotation.z = Math.PI / 2;
    w.position.set(wx, 0.1, wz);
    w.castShadow = true;
    car.add(w);
    wheels.push(w);
  }
}

const spawnH = terrainH(0, 0) + 0.6;
car.position.set(0, spawnH, 0);
scene.add(car);

// ═══════════════════════════════════════════════════════
// CAR PHYSICS
// ═══════════════════════════════════════════════════════
const cs = {
  vel: 0, heading: 0, steer: 0,
  pos: new THREE.Vector3(0, spawnH, 0),
  fwd: new THREE.Vector3(0, 0, -1),
  onRoad: null,
};

function updateCar(dt) {
  const k = window._keys || {};
  cs.onRoad = getRoadType(cs.pos.x, cs.pos.z);

  if (k['w'] || k['arrowup']) cs.vel += 30 * dt;
  if (k['s'] || k['arrowdown']) cs.vel -= 35 * dt;
  if (k[' ']) cs.vel *= 0.92;

  let frict = 0.97, maxS = 90;
  if (cs.onRoad === 'highway') { frict = 0.99; maxS = 90; }
  else if (cs.onRoad === 'street') { frict = 0.99; maxS = 72; }
  else if (cs.onRoad === 'dirt') { frict = 0.98; maxS = 40; }
  else { frict = 0.97; maxS = 90; }

  cs.vel *= frict;
  cs.vel = Math.max(-25, Math.min(maxS, cs.vel));

  let ts = 0;
  if (k['a'] || k['arrowleft']) ts = 0.7;
  if (k['d'] || k['arrowright']) ts = -0.7;
  cs.steer += (ts - cs.steer) * Math.min(1, 3 * dt * 5);

  const sf = Math.min(1, Math.abs(cs.vel) / 20);
  cs.heading += cs.steer * sf * 2.5 * dt;

  cs.fwd.set(-Math.sin(cs.heading), 0, -Math.cos(cs.heading));
  cs.pos.x += cs.fwd.x * cs.vel * dt;
  cs.pos.z += cs.fwd.z * cs.vel * dt;
  cs.pos.y = terrainH(cs.pos.x, cs.pos.z) + 0.6;

  const sx = (terrainH(cs.pos.x+2, cs.pos.z) - terrainH(cs.pos.x-2, cs.pos.z)) / 4;
  const sz = (terrainH(cs.pos.x, cs.pos.z+2) - terrainH(cs.pos.x, cs.pos.z-2)) / 4;
  cs.vel += -(sx * cs.fwd.x + sz * cs.fwd.z) * 12 * dt;

  for (const b of buildings) {
    const dx = cs.pos.x - b.x, dz = cs.pos.z - b.z;
    const ox = (b.w/2 + 1.3) - Math.abs(dx);
    const od = (b.d/2 + 2.5) - Math.abs(dz);
    if (ox > 0 && od > 0) {
      if (ox < od) { cs.pos.x += Math.sign(dx) * ox; cs.vel *= 0.3; }
      else { cs.pos.z += Math.sign(dz) * od; cs.vel *= 0.3; }
    }
  }

  const lim = TS/2 - 50;
  cs.pos.x = Math.max(-lim, Math.min(lim, cs.pos.x));
  cs.pos.z = Math.max(-lim, Math.min(lim, cs.pos.z));

  car.position.copy(cs.pos);
  car.rotation.y = cs.heading;
  const slx = (terrainH(cs.pos.x+2,cs.pos.z) - terrainH(cs.pos.x-2,cs.pos.z)) / 4;
  const slz = (terrainH(cs.pos.x,cs.pos.z+2) - terrainH(cs.pos.x,cs.pos.z-2)) / 4;
  car.rotation.x = -slz * 0.4;
  car.rotation.z = slx * 0.4;
  for (const w of wheels) w.rotation.x += cs.vel * dt * 0.8;

  if (k['r']) {
    const ry = terrainH(0,0) + 0.6;
    cs.pos.set(0, ry, 0);
    cs.vel = 0; cs.heading = 0; cs.steer = 0;
    cs.fwd.set(0, 0, -1);
  }
}

// ═══════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════
const cam = {
  dist: 16, height: 8,
  oYaw: Math.PI, oPitch: 0.12,
  sYaw: Math.PI, sPitch: 0.12,
  drag: false, lx: 0, ly: 0,
};

renderer.domElement.addEventListener('mousedown', e => {
  cam.drag = true; cam.lx = e.clientX; cam.ly = e.clientY;
  document.getElementById('hint').style.opacity = '0';
});
window.addEventListener('mouseup', () => cam.drag = false);
window.addEventListener('mousemove', e => {
  if (!cam.drag) return;
  cam.oYaw -= (e.clientX - cam.lx) * 0.005;
  cam.oPitch += (e.clientY - cam.ly) * 0.005;
  cam.oPitch = Math.max(-0.3, Math.min(1.2, cam.oPitch));
  cam.lx = e.clientX; cam.ly = e.clientY;
});
renderer.domElement.addEventListener('wheel', e => {
  cam.dist = Math.max(5, Math.min(30, cam.dist + e.deltaY * 0.01));
});

let tx, ty;
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { cam.drag = true; tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    document.getElementById('hint').style.opacity = '0'; }
});
renderer.domElement.addEventListener('touchmove', e => {
  if (!cam.drag || e.touches.length !== 1) return;
  cam.oYaw -= (e.touches[0].clientX - tx) * 0.005;
  cam.oPitch += (e.touches[0].clientY - ty) * 0.005;
  cam.oPitch = Math.max(-0.3, Math.min(1.2, cam.oPitch));
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
});
renderer.domElement.addEventListener('touchend', () => cam.drag = false);

function updateCam(dt) {
  const s = 1 - Math.pow(0.005, dt);
  cam.sYaw += (cam.oYaw - cam.sYaw) * s;
  cam.sPitch += (cam.oPitch - cam.sPitch) * s;

  const yaw = cs.heading + cam.sYaw;
  const pitch = cam.sPitch;
  const hd = Math.cos(pitch) * cam.dist;
  const vd = Math.sin(pitch) * cam.dist;

  const targetX = cs.pos.x + Math.sin(yaw) * hd;
  const targetY = cs.pos.y + vd + cam.height;
  const targetZ = cs.pos.z + Math.cos(yaw) * hd;

  const lf = 1 - Math.pow(0.008, dt);
  camera.position.x += (targetX - camera.position.x) * lf;
  camera.position.y += (targetY - camera.position.y) * lf;
  camera.position.z += (targetZ - camera.position.z) * lf;
  camera.lookAt(cs.pos.x, cs.pos.y + 1.5, cs.pos.z);
}

// ═══════════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════════
const mc = document.getElementById('minimap');
const mctx = mc.getContext('2d');
mc.width = 180; mc.height = 180;

function drawMM() {
  const w = mc.width, h = mc.height, sc = w / TS;
  mctx.fillStyle = '#1a2a1a'; mctx.fillRect(0, 0, w, h);

  for (const r of roads) {
    mctx.strokeStyle = r.type === 'dirt' ? '#8B7355' : r.type === 'highway' ? '#999' : '#666';
    mctx.lineWidth = r.type === 'highway' ? 2 : 1;
    mctx.beginPath();
    for (let i = 0; i < r.pts.length; i++) {
      const p = r.pts[i];
      const mx = (p.x + TS/2) * sc, mz = (p.z + TS/2) * sc;
      i === 0 ? mctx.moveTo(mx, mz) : mctx.lineTo(mx, mz);
    }
    mctx.stroke();
  }

  const cx = (cs.pos.x + TS/2) * sc, cz = (cs.pos.z + TS/2) * sc;
  mctx.fillStyle = '#ff3333'; mctx.beginPath(); mctx.arc(cx, cz, 3, 0, Math.PI * 2); mctx.fill();
  mctx.strokeStyle = '#ff3333'; mctx.lineWidth = 1.5;
  mctx.beginPath(); mctx.moveTo(cx, cz); mctx.lineTo(cx - cs.fwd.x * 8, cz - cs.fwd.z * 8); mctx.stroke();
}

// ═══════════════════════════════════════════════════════
// INPUT + HUD + LOOP
// ═══════════════════════════════════════════════════════
window._keys = {};
window.addEventListener('keydown', e => { window._keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { window._keys[e.key.toLowerCase()] = false; });

const spdEl = document.getElementById('spd');
const infoEl = document.getElementById('info');
const RN = { highway: 'HIGHWAY', street: 'CITY STREET', dirt: 'DIRT TRAIL' };
const RC = { highway: '#aaffaa', street: '#cccccc', dirt: '#c8a86e' };

function updateHUD() {
  spdEl.textContent = Math.round(Math.abs(cs.vel * 3.6));
  if (cs.onRoad) { infoEl.textContent = RN[cs.onRoad]; infoEl.style.color = RC[cs.onRoad]; }
  else { infoEl.textContent = 'OFF-ROAD'; infoEl.style.color = '#ff8888'; }
}

let lastTime = performance.now(), mmT = 0, fc = 0;

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  let dt = (now - lastTime) / 1000; lastTime = now;
  dt = Math.min(dt, 0.05);

  updateCar(dt); updateCam(dt); updateHUD();

  mmT += dt;
  if (mmT > 0.15) { mmT = 0; drawMM(); }

  renderer.render(scene, camera);

  fc++;
  if (fc === 1) console.log('Render OK. Cam:', camera.position.x.toFixed(0), camera.position.y.toFixed(0), camera.position.z.toFixed(0), 'Car:', cs.pos.x.toFixed(0), cs.pos.y.toFixed(0), cs.pos.z.toFixed(0), 'TerrainH@0,0:', terrainH(0,0).toFixed(1));
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
